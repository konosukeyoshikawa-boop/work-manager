<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンサルタントの仕事術大全 - The Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C0E12;
  --surface: #14171E;
  --surface-hover: #1A1E28;
  --border: #252A36;
  --accent: #C8A960;
  --accent-dim: #9A7F3E;
  --text: #E8E4DC;
  --text-dim: #8A8680;
  --text-muted: #5A5650;
  --white: #FAFAF8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: all 0.3s ease;
  overflow: hidden;
}
.sidebar.collapsed { width: 0; min-width: 0; }
.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header .label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.sidebar-header .title {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.4;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}
.chapter-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  width: 100%;
  padding: 12px 24px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  transition: background 0.2s;
  border-left: 2px solid transparent;
  font-family: inherit;
}
.chapter-btn.active {
  background: var(--surface-hover);
  border-left-color: var(--accent);
}
.chapter-btn .icon {
  font-size: 16px;
  color: var(--text-muted);
  margin-top: 1px;
  transition: color 0.2s;
}
.chapter-btn.active .icon { color: var(--accent); }
.chapter-btn .ch-title {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-dim);
  transition: color 0.2s;
  margin-bottom: 2px;
}
.chapter-btn.active .ch-title { font-weight: 700; color: var(--white); }
.chapter-btn .ch-sub {
  font-size: 11px;
  color: var(--text-muted);
}
.section-btn {
  display: block;
  width: 100%;
  padding: 8px 24px 8px 52px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
  transition: all 0.2s;
  line-height: 1.5;
  font-family: inherit;
}
.section-btn.active {
  background: rgba(200,169,96,0.07);
  color: var(--accent);
  font-weight: 500;
}
.section-btn:hover { color: var(--text-dim); }
.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
}
.progress-track {
  margin-top: 8px;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.3s ease;
}

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.toggle-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 14px;
  font-family: inherit;
}
.topbar-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
.topbar-right { display: flex; gap: 8px; }
.nav-btn-prev {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 12px;
  font-family: inherit;
}
.nav-btn-prev:disabled { border-color: transparent; color: var(--text-muted); cursor: default; }
.nav-btn-next {
  background: var(--accent);
  border: none;
  color: var(--bg);
  cursor: pointer;
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
}
.nav-btn-next:disabled { background: transparent; color: var(--text-muted); cursor: default; }
.reading-progress { height: 2px; background: var(--border); }
.reading-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-dim));
  transition: width 0.1s linear;
  width: 0%;
}
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 48px 32px 80px;
}
.content-inner { max-width: 720px; margin: 0 auto; }
.content-meta {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent-dim);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.content-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.4;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.title-bar {
  height: 2px;
  width: 48px;
  background: var(--accent);
  margin-bottom: 36px;
}
.content-body p {
  margin: 16px 0;
  font-size: 15px;
  line-height: 1.95;
  color: var(--text);
  text-align: justify;
}
.content-body .callout {
  margin: 28px 0;
  padding: 20px 24px;
  background: linear-gradient(135deg, var(--surface), var(--surface-hover));
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap;
}
.content-body .step-block {
  margin: 24px 0;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap;
}
.content-body .bullet-list { margin: 16px 0; padding-left: 8px; }
.content-body .bullet-item {
  display: flex;
  gap: 12px;
  margin-bottom: 8px;
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
}
.content-body .bullet-dot {
  color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}
.bottom-nav {
  margin-top: 56px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.bottom-prev {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  padding: 10px 20px;
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
}
.bottom-next {
  background: var(--accent);
  border: none;
  color: var(--bg);
  cursor: pointer;
  padding: 10px 20px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
}
.complete-label {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}
@media (max-width: 768px) {
  .sidebar { width: 260px; min-width: 260px; position: fixed; z-index: 100; height: 100vh; }
  .sidebar.collapsed { width: 0; min-width: 0; }
  .content-area { padding: 32px 20px 80px; }
  .content-title { font-size: 22px; }
  .topbar { padding: 12px 20px; }
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="label">The Playbook</div>
      <div class="title">コンサルタントの<br>仕事術大全</div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-footer">
      <span id="progressText"></span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-btn" id="toggleBtn">&larr;</button>
        <span class="topbar-label" id="topbarLabel"></span>
      </div>
      <div class="topbar-right">
        <button class="nav-btn-prev" id="prevBtn">&larr; Prev</button>
        <button class="nav-btn-next" id="nextBtn">Next &rarr;</button>
      </div>
    </div>
    <div class="reading-progress"><div class="reading-fill" id="readingFill"></div></div>
    <div class="content-area" id="contentArea">
      <div class="content-inner">
        <div class="content-meta" id="contentMeta"></div>
        <h1 class="content-title" id="contentTitle"></h1>
        <div class="title-bar"></div>
        <div class="content-body" id="contentBody"></div>
        <div class="bottom-nav" id="bottomNav"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CHAPTERS = [

      {
        title: "コンサルティングファームの仕事術とは何か",
        content: "コンサルティングファーム出身者が共通して身につけている仕事術は、単なるテクニックの集合ではない。それは「限られた時間で、曖昧な問題を構造化し、意思決定可能な形にまで落とし込む」ための思考OS(オペレーティングシステム)である。\n\nこの思考OSの根底にあるのは、以下の3つの原則だ。\n\n第一に「イシュードリブン」。何を解くべきかを定義することが、解くこと以上に重要だという信念。多くのビジネスパーソンが「やるべきこと」から考え始めるのに対し、コンサル出身者は「答えるべき問い」から始める。\n\n第二に「仮説思考」。情報が揃うのを待たず、不完全な情報から仮の答えを立て、それを検証・修正していくアプローチ。完璧を目指して調査に時間を費やすのではなく、早期に仮説を立てることで、何を調べるべきかが明確になる。\n\n第三に「構造化」。複雑な問題をMECE（漏れなくダブりなく）に分解し、優先順位をつけて取り組む。これにより、問題の全体像を見失わずに、最もインパクトの大きい部分から着手できる。\n\nこの3つが相互に連動することで、「正しい問いを立て、素早く仮説を構築し、構造的に検証する」という一連のサイクルが回る。本ガイドでは、この思考OSを構成する各要素を網羅的に解説する。"
      },
      {

        content: "本ガイドは以下の7つの章で構成される。\n\nChapter 1「論点設定」では、問題解決の出発点となる「正しい問いの立て方」を扱う。イシューツリーの作り方、論点の優先順位付け、クライアントの真の課題を見抜く方法を解説する。\n\nChapter 2「問題解決」では、仮説思考をベースとした問題解決のフレームワーク群を体系的に整理する。分析手法、フレームワークの使い分け、So What / Why Soの思考法を網羅する。\n\nChapter 3「タスク管理」では、プロジェクト単位のワークプラン設計から日次のタスク管理まで、コンサル流の時間管理術を詳述する。\n\nChapter 4「コミュニケーション」では、ピラミッドストラクチャーに基づく伝え方、スライドライティング、ファシリテーション技法を扱う。\n\nChapter 5「分析技法」では、定量分析・定性分析の具体的手法、データの読み解き方、示唆の導出方法を解説する。\n\nChapter 6「プロジェクト運営」では、チームマネジメント、ステークホルダー管理、品質管理の実務を扱う。\n\nChapter 7「思考習慣」では、日常的に実践すべき思考訓練と、コンサル的思考を組織に根付かせる方法を論じる。"

      {
        title: "1-1. イシューとは何か",
        content: "イシュー(Issue)とは、「答えを出すべき問い」のことである。安宅和人氏の定義を借りれば、「答えを出す必要性が高く、かつ答えを出せる見込みがある問い」がイシューである。\n\nビジネスの現場では、無数の「気になること」が存在する。しかし、そのすべてに取り組む時間はない。イシューの設定とは、その無数の問いの中から「今、この瞬間に答えを出すべき問い」を特定する行為である。\n\n良いイシューには3つの条件がある。\n\n(1) 本質的な選択を迫るものであること。「売上を上げるべきか?」はイシューではない。当然上げるべきだからだ。「既存顧客の深耕と新規顧客の開拓、どちらを優先すべきか?」はイシューになり得る。\n\n(2) 深い仮説があること。単なる疑問文ではなく、その裏に「こうではないか」という仮説的な見立てがあるもの。「なぜ売上が下がっているのか?」よりも「売上低下の主因は、既存顧客の離脱率上昇ではないか?」の方が強いイシューである。\n\n(3) 答えが出せるものであること。「世界平和は実現するか?」は哲学的問いとしては面白いが、ビジネスのイシューにはならない。期間内に、利用可能なリソースで、検証可能な問いであることが必要だ。"

        title: "1-2. イシューツリーの構築方法",
        content: "イシューツリーとは、大きなイシュー(メインイシュー)を、答えが出せるレベルまで分解したツリー構造のことである。ロジックツリーの一種だが、「論点」を分解する点が特徴的である。\n\n構築の手順は以下の通り。\n\nステップ1:メインイシューの設定。プロジェクト全体で答えるべき最上位の問いを一文で定義する。例:「当社は3年以内にEC売上を3倍にするために、何に投資すべきか?」\n\nステップ2:サブイシューへの分解。メインイシューをMECEに2-4個のサブイシューに分解する。分解の切り口としては、(a) プロセス分解(バリューチェーンに沿って分ける)、(b) 要素分解(構成要素に分ける)、(c) 対立軸分解(AかBかの選択肢で分ける)、の3パターンが基本になる。\n\n上記の例であれば、「集客投資を強化すべきか?(流入増)」「CVR改善に投資すべきか?(転換率向上)」「LTV向上に投資すべきか?(顧客単価・継続率)」「オペレーション基盤に投資すべきか?(実行力)」のように分解できる。\n\nステップ3:各サブイシューをさらに分解。「集客投資を強化すべきか?」であれば、「現在の集客チャネル別ROIはどうなっているか?」「未開拓チャネルのポテンシャルはどの程度か?」「競合の集客戦略から学べることは何か?」といった具合に、答えが出せるレベルまで掘り下げる。\n\nステップ4:優先順位付け。すべてのサブイシューに均等に取り組むのではなく、(a) インパクトの大きさ、(b) 検証の容易さ、(c) 時間的緊急度、の3軸で優先順位をつける。"

      },
      {

      },

let activeChapter = 0;
let activeSection = 0;
let sidebarOpen = true;

function getTotalSections() {
  return CHAPTERS.reduce((s, c) => s + c.sections.length, 0);
}

function getCurrentGlobal() {
  let g = 0;
  for (let i = 0; i < activeChapter; i++) g += CHAPTERS[i].sections.length;
  return g + activeSection + 1;
}

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  CHAPTERS.forEach((ch, ci) => {
    html += `<button class="chapter-btn ${ci === activeChapter ? 'active' : ''}" onclick="setChapter(${ci})">
      <span class="icon">${ch.icon}</span>
      <div>
        <div class="ch-title">${ch.title}</div>
        <div class="ch-sub">${ch.subtitle}</div>
      </div>
    </button>`;
    if (ci === activeChapter) {
      ch.sections.forEach((sec, si) => {
        html += `<button class="section-btn ${si === activeSection ? 'active' : ''}" onclick="setSection(${si})">${sec.title}</button>`;
      });
    }
  });
  nav.innerHTML = html;
  
  const total = getTotalSections();
  const current = getCurrentGlobal();
  document.getElementById('progressText').textContent = `${current} / ${total} sections`;
  document.getElementById('progressFill').style.width = `${(current / total) * 100}%`;
}

function renderContent() {
  const ch = CHAPTERS[activeChapter];
  const sec = ch.sections[activeSection];
  
  document.getElementById('topbarLabel').textContent = ch.title;
  document.getElementById('contentMeta').textContent = `${ch.title} \u00B7 Section ${activeSection + 1} of ${ch.sections.length}`;
  document.getElementById('contentTitle').textContent = sec.title;
  
  const body = document.getElementById('contentBody');
  const paragraphs = sec.content.split('\n\n');
  let html = '';
  
  paragraphs.forEach(para => {
    const trimmed = para.trim();
    if (!trimmed) return;
    
    if (/^[\u3010\[]/.test(trimmed)) {
      html += `<div class="callout">${escapeHtml(trimmed)}</div>`;
    } else if (/^(Phase |Step |ステップ|フェーズ|レベル|パターン)/.test(trimmed)) {
      html += `<div class="step-block">${escapeHtml(trimmed)}</div>`;
    } else if (trimmed.startsWith('- ') || trimmed.includes('\n- ')) {
      const lines = trimmed.split('\n');
      html += '<div class="bullet-list">';
      lines.forEach(line => {
        if (line.trim().startsWith('- ')) {
          html += `<div class="bullet-item"><span class="bullet-dot">\u2022</span><span>${escapeHtml(line.trim().slice(2))}</span></div>`;
        } else {
          html += `<p>${escapeHtml(line)}</p>`;
        }
      });
      html += '</div>';
    } else {
      html += `<p>${escapeHtml(trimmed)}</p>`;
    }
  });
  
  body.innerHTML = html;
  
  // Navigation buttons
  const hasPrev = activeChapter > 0 || activeSection > 0;
  const hasNext = activeChapter < CHAPTERS.length - 1 || activeSection < ch.sections.length - 1;
  
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = !hasPrev;
  nextBtn.disabled = !hasNext;
  
  let bottomHtml = '';
  if (hasPrev) {
    bottomHtml += `<button class="bottom-prev" onclick="goPrev()">\u2190 \u524D\u306E\u30BB\u30AF\u30B7\u30E7\u30F3</button>`;
  } else {
    bottomHtml += '<div></div>';
  }
  if (hasNext) {
    bottomHtml += `<button class="bottom-next" onclick="goNext()">\u6B21\u306E\u30BB\u30AF\u30B7\u30E7\u30F3 \u2192</button>`;
  } else {
    bottomHtml += `<div class="complete-label">\u2605 \u5168\u30BB\u30AF\u30B7\u30E7\u30F3\u5B8C\u4E86</div>`;
  }
  document.getElementById('bottomNav').innerHTML = bottomHtml;
  
  document.getElementById('contentArea').scrollTop = 0;
  document.getElementById('readingFill').style.width = '0%';
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function setChapter(ci) {
  activeChapter = ci;
  activeSection = 0;
  renderSidebar();
  renderContent();
}

function setSection(si) {
  activeSection = si;
  renderSidebar();
  renderContent();
}

function goNext() {
  const ch = CHAPTERS[activeChapter];
  if (activeSection < ch.sections.length - 1) {
    activeSection++;
  } else if (activeChapter < CHAPTERS.length - 1) {
    activeChapter++;
    activeSection = 0;
  }
  renderSidebar();
  renderContent();
}

function goPrev() {
  if (activeSection > 0) {
    activeSection--;
  } else if (activeChapter > 0) {
    activeChapter--;
    activeSection = CHAPTERS[activeChapter].sections.length - 1;
  }
  renderSidebar();
  renderContent();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('toggleBtn');
  if (sidebarOpen) {
    sb.classList.remove('collapsed');
    btn.innerHTML = '&larr;';
  } else {
    sb.classList.add('collapsed');
    btn.innerHTML = '&rarr;';
  }
}

document.getElementById('toggleBtn').addEventListener('click', toggleSidebar);
document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);

document.getElementById('contentArea').addEventListener('scroll', function() {
  const el = this;
  const p = el.scrollTop / (el.scrollHeight - el.clientHeight || 1);
  document.getElementById('readingFill').style.width = `${Math.min(1, Math.max(0, p)) * 100}%`;
});

// Init
renderSidebar();
renderContent();
</script>
