<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日次チェックリスト</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Meiryo', sans-serif; background: #faf8f3; color: #2d2a24; padding: 24px; padding-top: 72px; }

  /* Fixed header nav */
  .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; border-bottom: 1px solid #e5e0d5; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 0 32px; display: flex; align-items: center; gap: 16px; height: 52px; }
  .fixed-header-title { font-size: 14px; font-weight: 700; color: #1a1814; white-space: nowrap; flex-shrink: 0; }
  .fixed-header-nav { display: flex; flex-wrap: wrap; gap: 6px; overflow-x: auto; }
  .fixed-header-nav a { display: inline-block; padding: 5px 12px; border-radius: 6px; border: 1px solid #d5d0c5; font-size: 12px; font-weight: 500; color: #6b6560; transition: all 0.15s; white-space: nowrap; text-decoration: none; }
  .fixed-header-nav a:hover { border-color: #1e3a5f; color: #1e3a5f; background: #f0f4f8; }
  .fixed-header-nav a.nav-active { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }
  .fixed-header-nav a.nav-ref { border-style: dashed; font-size: 11px; color: #a09a90; }
  .fixed-header-nav a.nav-ref:hover { border-color: #1e3a5f; color: #1e3a5f; border-style: solid; }
  .nav-group { display: flex; align-items: center; gap: 6px; }
  .nav-sep { width: 1px; height: 20px; background: #e5e0d5; margin: 0 6px; flex-shrink: 0; }

  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #1a1814; }
  .subtitle { font-size: 13px; color: #8a8478; margin-bottom: 16px; }

  /* Progress banner */
  .progress-banner { background: linear-gradient(90deg, #1e3a5f, #152a45); color: #fff; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .progress-banner .label { font-size: 13px; font-weight: 600; }
  .progress-banner .bar-wrap { flex: 1; max-width: 400px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
  .progress-banner .bar-fill { height: 100%; background: #4ade80; border-radius: 4px; transition: width 0.4s ease; }
  .progress-banner .count { font-size: 13px; font-weight: 600; min-width: 60px; text-align: right; }

  /* Section */
  .section { background: #fff; border: 1px solid #e5e0d5; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; cursor: pointer; user-select: none; border-bottom: 1px solid #ede9e0; }
  .section-header:hover { background: #fdfcf9; }
  .section-icon { font-size: 12px; font-weight: 700; flex-shrink: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: #1e3a5f; color: #fff; border-radius: 50%; }
  .section-title { font-size: 14px; font-weight: 600; color: #1a1814; flex: 1; }
  .section-time { font-size: 11px; color: #8a8478; background: #f5f3ee; padding: 2px 8px; border-radius: 4px; }
  .section-progress { font-size: 12px; font-weight: 600; color: #8a8478; }
  .section-progress.done { color: #16a34a; }
  .section-toggle { font-size: 10px; color: #b8b0a4; transition: transform 0.2s; }
  .section-toggle.collapsed { transform: rotate(-90deg); }
  .section-body { padding: 0; }
  .section-body.collapsed { display: none; }

  /* Check item */
  .check-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f5f3ee; transition: background 0.15s; }
  .check-item:last-child { border-bottom: none; }
  .check-item:hover { background: #fdfcf9; }
  .check-item.checked { background: #f9fdf6; }
  .check-item.checked .item-title { color: #a3a39a; text-decoration: line-through; }
  .check-item.checked .item-desc { color: #c5c0b8; }

  .item-cb { width: 18px; height: 18px; cursor: pointer; accent-color: #16a34a; flex-shrink: 0; margin-top: 1px; }
  .item-content { flex: 1; min-width: 0; }
  .item-title { font-size: 13px; font-weight: 500; color: #2d2a24; line-height: 1.4; }
  .item-desc { font-size: 11px; color: #8a8478; margin-top: 2px; line-height: 1.4; }
  .item-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .tag-finance { background: #fef3c7; color: #92400e; }
  .tag-ad { background: #ede9fe; color: #5b21b6; }
  .tag-bpo { background: #dbeafe; color: #1e40af; }
  .tag-creative { background: #fce7f3; color: #9d174d; }
  .tag-ops { background: #f0fdf4; color: #166534; }

  /* History */
  .history-section { margin-top: 24px; }
  .history-title { font-size: 14px; font-weight: 600; color: #1a1814; margin-bottom: 10px; }
  .history-grid { display: flex; gap: 4px; flex-wrap: wrap; }
  .history-day { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; cursor: default; position: relative; }
  .history-day.full { background: #16a34a; color: #fff; }
  .history-day.partial { background: #fbbf24; color: #fff; }
  .history-day.none { background: #e5e0d5; color: #8a8478; }
  .history-day.future { background: #f5f3ee; color: #c5c0b8; }
  .history-day.today { box-shadow: 0 0 0 2px #1e3a5f; }
  .history-tooltip { display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #2d2a24; color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 4px; white-space: nowrap; z-index: 10; }
  .history-day:hover .history-tooltip { display: block; }

  /* Reset button */
  .reset-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; border: 1px solid #e5e0d5; background: #fff; font-size: 12px; color: #6b6560; cursor: pointer; transition: all 0.15s; }
  .reset-btn:hover { border-color: #dc2626; color: #dc2626; background: #fef2f2; }

  .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
</style>
</head>
<body>

<div class="fixed-header">
  <div class="fixed-header-title">Work Manager</div>
  <nav class="fixed-header-nav">
    <div class="nav-group">
      <a href="gantt.html">タスク管理</a>
      <a href="self-management.html" class="nav-active">自己管理</a>
    </div>
    <div class="nav-sep"></div>
    <div class="nav-group">
      <a href="goal-plan.html">事業計画</a>
      <a href="../backoffice/cashflow/dashboard.html">管理会計</a>
      <a href="../backoffice/cashflow/ss_dashboard.html">予実管理</a>
    </div>
    <div class="nav-sep"></div>
    <div class="nav-group">
      <a href="project-structure.html" class="nav-ref">プロジェクト構成</a>
      <a href="consulting-playbook.html" class="nav-ref">コンサル技術</a>
    </div>
  </nav>
</div>

<div class="top-row">
  <div>
    <h1>日次チェックリスト</h1>
    <div class="subtitle" id="date-label"></div>
  </div>
  <button class="reset-btn" onclick="resetToday()">
    <span>&#8635;</span> 今日のチェックをリセット
  </button>
</div>

<div class="progress-banner">
  <div class="label">今日の進捗</div>
  <div class="bar-wrap"><div class="bar-fill" id="global-bar"></div></div>
  <div class="count" id="global-count">0 / 0</div>
</div>

<div id="checklist-root"></div>

<div class="history-section">
  <div class="history-title">直近14日間の達成状況</div>
  <div class="history-grid" id="history-grid"></div>
</div>

<script>
const SECTIONS = [
  {
    id: 'morning',
    icon: '1',
    title: '朝イチ（始業時）',
    time: '9:00',
    items: [
      { id: 'm1', title: '口座残高・資金繰り確認', desc: 'freee会計で前日の入出金・残高を確認', tag: 'finance' },
      { id: 'm2', title: 'Meta広告：前日の配信実績確認', desc: 'CPA / ROAS / CTR / CVR / CPM — 異常値がないかチェック', tag: 'ad' },
      { id: 'm3', title: 'Slack・メール：未対応の連絡確認', desc: 'クライアント・OP・業務委託からの連絡を確認・返信', tag: 'ops' },
      { id: 'm4', title: '今日の予定・MTG確認', desc: 'カレンダーを確認し、準備が必要な会議をチェック', tag: 'ops' },
    ]
  },
  {
    id: 'daytime',
    icon: '2',
    title: '日中（実行）',
    time: '10:00–17:00',
    items: [
      { id: 'd1', title: 'ピンタレストのブックマーク 5件', desc: 'クリエイティブ参考素材のストック', tag: 'creative' },
      { id: 'd2', title: 'クリエイティブ生成 3件', desc: '新規広告クリエイティブの制作', tag: 'creative' },
      { id: 'd3', title: 'OP稼働状況の確認', desc: 'BPO案件の各OPの進捗・問題がないか確認', tag: 'bpo' },
    ]
  },
  {
    id: 'evening',
    icon: '3',
    title: '終業時（クロージング）',
    time: '17:00–18:00',
    items: [
      { id: 'e1', title: '今日のタスク完了状況の確認', desc: 'todo.mdの進捗を更新。未完了タスクの理由を記録', tag: 'ops' },
      { id: 'e2', title: '明日の優先タスク確認', desc: '明日の最優先3つを決めておく', tag: 'ops' },
      { id: 'e3', title: 'Meta広告：当日の配信実績 最終確認', desc: '日中の推移を確認し、異常があれば即対応', tag: 'ad' },
    ]
  }
];

const TAG_LABELS = {
  finance: { label: '経営・財務', cls: 'tag-finance' },
  ad: { label: 'Meta広告', cls: 'tag-ad' },
  bpo: { label: 'BPO', cls: 'tag-bpo' },
  creative: { label: 'クリエイティブ', cls: 'tag-creative' },
  ops: { label: '運営', cls: 'tag-ops' },
};

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getState() {
  const raw = localStorage.getItem('daily-checklist-state');
  if (!raw) return {};
  try { return JSON.parse(raw); } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem('daily-checklist-state', JSON.stringify(state));
}

function getTodayChecked() {
  const state = getState();
  return state[todayKey()] || {};
}

function setItemChecked(itemId, checked) {
  const state = getState();
  const key = todayKey();
  if (!state[key]) state[key] = {};
  state[key][itemId] = checked;
  saveState(state);
}

function getAllItemIds() {
  return SECTIONS.flatMap(s => s.items.map(i => i.id));
}

function render() {
  const root = document.getElementById('checklist-root');
  root.innerHTML = '';
  const checked = getTodayChecked();
  const allIds = getAllItemIds();
  const totalChecked = allIds.filter(id => checked[id]).length;

  // Global progress
  document.getElementById('global-bar').style.width = allIds.length ? `${(totalChecked/allIds.length)*100}%` : '0%';
  document.getElementById('global-count').textContent = `${totalChecked} / ${allIds.length}`;

  // Date label
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('date-label').textContent = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}（${days[now.getDay()]}）`;

  SECTIONS.forEach(section => {
    const sectionChecked = section.items.filter(i => checked[i.id]).length;
    const allDone = sectionChecked === section.items.length;

    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <div class="section-header" data-section="${section.id}">
        <div class="section-icon">${section.icon}</div>
        <div class="section-title">${section.title}</div>
        <div class="section-time">${section.time}</div>
        <div class="section-progress ${allDone ? 'done' : ''}">${sectionChecked}/${section.items.length}</div>
        <div class="section-toggle" data-section="${section.id}">&#9660;</div>
      </div>
      <div class="section-body" id="body-${section.id}">
        ${section.items.map(item => {
          const isChecked = !!checked[item.id];
          const tagInfo = TAG_LABELS[item.tag] || {};
          return `
            <div class="check-item ${isChecked ? 'checked' : ''}" data-item="${item.id}">
              <input type="checkbox" class="item-cb" data-item="${item.id}" ${isChecked ? 'checked' : ''}>
              <div class="item-content">
                <div class="item-title">
                  ${item.title}
                  <span class="item-tag ${tagInfo.cls || ''}">${tagInfo.label || ''}</span>
                </div>
                <div class="item-desc">${item.desc}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    root.appendChild(div);
  });

  // Event listeners — checkboxes
  document.querySelectorAll('.item-cb').forEach(cb => {
    cb.addEventListener('change', (e) => {
      setItemChecked(e.target.dataset.item, e.target.checked);
      render();
    });
  });

  // Event listeners — section toggle
  document.querySelectorAll('.section-header').forEach(header => {
    header.addEventListener('click', (e) => {
      if (e.target.classList.contains('item-cb')) return;
      const sid = header.dataset.section;
      const body = document.getElementById(`body-${sid}`);
      const toggle = header.querySelector('.section-toggle');
      body.classList.toggle('collapsed');
      toggle.classList.toggle('collapsed');
    });
  });

  renderHistory();
}

function resetToday() {
  if (!confirm('今日のチェックをすべてリセットしますか？')) return;
  const state = getState();
  delete state[todayKey()];
  saveState(state);
  render();
}

function renderHistory() {
  const grid = document.getElementById('history-grid');
  grid.innerHTML = '';
  const state = getState();
  const allIds = getAllItemIds();
  const total = allIds.length;
  const today = new Date();
  today.setHours(0,0,0,0);

  for (let i = 13; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayChecked = state[key] || {};
    const count = allIds.filter(id => dayChecked[id]).length;
    const isToday = i === 0;
    const isFuture = d > today;
    const dayOfWeek = ['日','月','火','水','木','金','土'][d.getDay()];

    let cls = 'none';
    if (isFuture) cls = 'future';
    else if (count === total && total > 0) cls = 'full';
    else if (count > 0) cls = 'partial';

    const el = document.createElement('div');
    el.className = `history-day ${cls} ${isToday ? 'today' : ''}`;
    el.innerHTML = `
      ${d.getDate()}
      <div class="history-tooltip">${d.getMonth()+1}/${d.getDate()}（${dayOfWeek}）${count}/${total} 完了</div>
    `;
    grid.appendChild(el);
  }
}

// Cleanup old data (keep 30 days)
function cleanupOldState() {
  const state = getState();
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  const cutoffKey = `${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}-${String(cutoff.getDate()).padStart(2,'0')}`;
  let changed = false;
  for (const key of Object.keys(state)) {
    if (key < cutoffKey) { delete state[key]; changed = true; }
  }
  if (changed) saveState(state);
}

cleanupOldState();
render();
</script>
</body>
</html>
